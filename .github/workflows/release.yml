name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'pi/**'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build web app (vite)
      - run: npm ci
      - run: npx vite build

      # Build Pi backend (TypeScript)
      - run: cd pi && npm ci
      - run: cd pi && npx tsc

      # Production-only deps for Pi (included in tarball)
      - run: cd pi && npm install --omit=dev --package-lock=false

      # Package: pi/dist/ (compiled backend), dist/ (web UI), pi/node_modules/
      - run: tar czf dist.tar.gz dist/ pi/dist/ pi/node_modules/ pi/package.json pi/setup-lotus.sh pi/uninstall-lotus.sh pi/update-services.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
